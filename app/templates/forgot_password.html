{% extends "layout.html" %}
{% block content %}
    <div class="content-section py-3 px-4 mb-4">
        <h2 class="mb-4">Forgot Password</h2>
        <p class="text-body-secondary mb-4">Enter your email address and we'll send you a link to reset your password.</p>
        <form id="forgotPasswordForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       required
                       autofocus>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Link</button>
        </form>
        <p class="mt-3">
            Remember your password? <a href="{{ url_for("login_page") }}">Login here</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
  import { getErrorMessage, showModal } from '/static/js/utils.js';

  const forgotPasswordForm = document.getElementById('forgotPasswordForm');
  const submitBtn = document.getElementById('submitBtn');

  forgotPasswordForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    // Disable button during submission
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    const formData = new FormData(forgotPasswordForm);
    const data = Object.fromEntries(formData.entries());

    try {
      const response = await fetch('/api/users/forgot-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
      });

      // Always show success message (even if email doesn't exist - security)
      if (response.status === 202) {
        document.getElementById('successMessage').textContent =
          'If an account exists with this email, you will receive password reset instructions shortly.';
        showModal('successModal');

        // Clear form
        forgotPasswordForm.reset();
      } else {
        const error = await response.json();
        document.getElementById('errorMessage').textContent = getErrorMessage(error);
        showModal('errorModal');
      }
    } catch (error) {
      document.getElementById('errorMessage').textContent =
        'Network error. Please check your connection and try again.';
      showModal('errorModal');
    } finally {
      // Re-enable button
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
    }
  });
    </script>
{% endblock scripts %}
